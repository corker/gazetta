name = "gazetta-studio"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

[[routes]]
pattern = "gazetta.studio/*"
zone_name = "gazetta.studio"

[[routes]]
pattern = "www.gazetta.studio/*"
zone_name = "gazetta.studio"

[[r2_buckets]]
binding = "SITE_BUCKET"
bucket_name = "gazetta-studio-site"
