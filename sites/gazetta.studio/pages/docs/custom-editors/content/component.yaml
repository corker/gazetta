template: text
content:
  body: |
    <p>The CMS auto-generates editor forms from your template's Zod schema. For templates that need a richer editing experience, you can create a <strong>custom editor</strong> that replaces the default form entirely.</p>

    <h3>Create a custom editor</h3>
    <p>Add a file at <code>admin/editors/{template-name}.tsx</code>:</p>
    <pre><code>// admin/editors/hero.tsx
    import React, { useState } from 'react'
    import { createRoot } from 'react-dom/client'
    import { DefaultEditorForm } from 'gazetta/editor'
    import type { EditorMount } from 'gazetta/types'

    function HeroEditor({ content, schema, onChange, theme }) {
      const [data, setData] = useState(content)
      const handleChange = (c) =&gt; { setData(c); onChange(c) }
      return (
        &lt;div&gt;
          &lt;div style={{ padding: '1.5rem', background: 'linear-gradient(135deg, #667eea, #764ba2)', borderRadius: 8, color: '#fff', textAlign: 'center', marginBottom: '1rem' }}&gt;
            &lt;h2&gt;{data.title || 'Untitled'}&lt;/h2&gt;
          &lt;/div&gt;
          &lt;DefaultEditorForm schema={schema} content={data} onChange={handleChange} /&gt;
        &lt;/div&gt;
      )
    }

    const roots = new WeakMap()
    const editor: EditorMount = {
      mount(el, props) {
        const root = createRoot(el); roots.set(el, root)
        root.render(&lt;HeroEditor {...props} /&gt;)
      },
      unmount(el) { roots.get(el)?.unmount(); roots.delete(el) },
    }
    export default editor</code></pre>

    <h3>How it works</h3>
    <p>When you select a component in the CMS, Gazetta checks if <code>admin/editors/{template}.tsx</code> exists. If it does, the custom editor is loaded and mounted instead of the default form. If not, the auto-generated @rjsf form is used.</p>

    <h3>EditorMount contract</h3>
    <p>Custom editors export an <code>EditorMount</code> object with <code>mount(el, props)</code> and <code>unmount(el)</code> methods — the same micro-frontend pattern used by single-spa. Works with React, Vue, Svelte, or vanilla JS.</p>
    <p>The <code>mount</code> function receives:</p>
    <ul>
      <li><code>content</code> — current content values</li>
      <li><code>schema</code> — JSON Schema for the template</li>
      <li><code>theme</code> — <code>'dark'</code> or <code>'light'</code></li>
      <li><code>onChange</code> — call when content changes</li>
    </ul>

    <h3>Embedding the default form</h3>
    <p>Import <code>DefaultEditorForm</code> from <code>gazetta/editor</code> to embed the auto-generated form inside your custom editor. This gives you custom UI on top (live preview, visual controls) with standard form fields below.</p>

    <h3>Hot reload</h3>
    <p>Custom editors are served by Vite in dev mode. Edit your <code>.tsx</code> file and the editor updates via HMR — no page refresh needed.</p>
