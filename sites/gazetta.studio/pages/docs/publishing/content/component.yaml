template: text
content:
  body: |
    <p>Each target has <strong>storage</strong> (where files go) and an optional <strong>worker</strong> (what serves them).</p>
    <p><strong>Storage types:</strong> <code>filesystem</code> (local), <code>s3</code> (AWS S3, Cloudflare R2, MinIO), <code>azure-blob</code></p>
    <p><strong>Worker types:</strong> <code>cloudflare</code> (edge assembly). More coming.</p>
    <p><strong>Publish content:</strong></p>
    <p><code>npx gazetta publish</code> — publishes to all targets<br>
    <code>npx gazetta publish -t production</code> — specific target</p>
    <p><strong>Deploy worker (one-time):</strong></p>
    <p><code>npx gazetta deploy -t production</code> — deploys the Cloudflare Worker</p>
    <p>Publish as often as you want. Deploy once. The CMS Publish button triggers publish, not deploy.</p>
    <p><strong>Cache configuration</strong> per target in <code>site.yaml</code>:</p>
    <p><code>browser: 60</code> — seconds before the browser revalidates (max-age)<br>
    <code>edge: 86400</code> — seconds before the CDN refetches from storage (s-maxage)</p>
    <p>Pages can override with their own <code>cache:</code> in <code>page.yaml</code>. Defaults: browser 0, edge 86400.</p>
    <p><strong>ETags</strong> are automatic. Browsers get <code>304 Not Modified</code> for unchanged pages — zero bandwidth even with <code>browser: 0</code>.</p>
