template: text
content:
  body: |
    <p><code>npx gazetta dev</code> starts the CMS at <code>/admin</code> alongside your site.</p>
    <p><strong>Browse:</strong> Pages and fragments in the left sidebar. Click to select.</p>
    <p><strong>Edit:</strong> Click a component in the tree → editor form appears (auto-generated from the Zod schema). Fragments are editable too — click <code>@header</code> to edit its content, or expand to edit children.</p>
    <p><strong>Click-to-edit:</strong> Toggle <strong>Edit mode</strong> in the preview toolbar. Click any component directly in the preview to select and edit it.</p>
    <p><strong>Preview:</strong> Live preview updates as you type. Device presets (desktop, tablet, mobile) and fullscreen mode available. Template changes hot-reload automatically — edit a <code>.ts</code> or <code>.tsx</code> file and the preview updates via morphdom with no page flash.</p>
    <p><strong>Save:</strong> Writes changes to disk.</p>
    <p><strong>Publish:</strong> Select targets and publish — pre-renders and uploads to the target storage.</p>
    <p><strong>Fetch:</strong> Pull content from a target back into your local site. Useful for recovering from a lost CMS or syncing between environments.</p>
    <p><strong>Dark mode:</strong> Toggle with the sun/moon icon in the toolbar.</p>
