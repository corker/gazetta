template: text
content:
  body: |
    <p>Fragments live in <code>fragments/</code> and are referenced with <code>"@"</code> in page manifests.</p>
    <p><strong>Create a fragment:</strong></p>
    <p><code>fragments/header/fragment.yaml</code> — defines the template and content, just like a component.</p>
    <p><strong>Reference in a page:</strong></p>
    <p><code>"@header"</code> in the page's <code>components</code> list. The <code>@</code> tells Gazetta to look in <code>fragments/</code>.</p>
    <p><strong>Update once, reflect everywhere:</strong> Change the header fragment — every page that uses <code>"@header"</code> gets the update. No need to re-publish each page.</p>
    <p><strong>At the edge:</strong> Fragments are independently stored and cached. The worker assembles them into pages at request time using ESI-style composition. Update a fragment in R2 and all pages reflect it on the next request.</p>
