name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Run unit and integration tests
        run: npx vitest run --exclude '**/publish.test.ts'

      - name: Run publish tests (requires Docker)
        run: npx vitest run apps/web/tests/publish.test.ts
