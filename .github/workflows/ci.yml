name: CI

on:
  push:
    branches: [main]
  # No base-branch filter — CI runs on every PR, including stacked ones
  # whose base is another feature branch. Without this, stacked PRs show
  # zero checks until they're retargeted to main.
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  # Cancel older runs on PR branches only. On main, let every commit's
  # run finish — cancelling mid-flight could leave a push unvalidated
  # and races with deploy/publish workflows that trust CI.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/gazetta
      - run: npm test -w packages/gazetta

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/gazetta

      # Cache Playwright browsers keyed by lockfile — version bumps
      # invalidate automatically. `--with-deps` still runs (system libs)
      # but browser download is skipped on cache hit.
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - run: npx playwright test --project=dev --shard=${{ matrix.shard }}/3

      - name: Upload test-results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

  # Pack once on linux — tarball is platform-independent.
  pack:
    runs-on: ubuntu-latest
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/gazetta
      - run: npm run build:admin -w packages/gazetta
      - id: pack
        working-directory: packages/gazetta
        run: |
          tarball=$(npm pack --silent | tail -1)
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: gazetta-tarball
          path: packages/gazetta/${{ steps.pack.outputs.tarball }}
          retention-days: 1

  # Consume the packed tarball on each OS. The pack/install/dev path is what
  # end users experience — this is where platform-specific issues surface.
  smoke:
    needs: pack
    strategy:
      fail-fast: false
      matrix:
        # Windows smoke runs on main-only. PRs get Ubuntu + macOS for faster
        # feedback; Windows catches path/shell regressions post-merge, before
        # any tag is cut. Branch protection + linear history keeps the chain
        # honest — a tag always points at a SHA that cleared all three.
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest","macos-latest"]') || fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: gazetta-tarball
          path: packages/gazetta/
      - name: Smoke test (init → dev → curl)
        shell: bash
        run: |
          # Find the downloaded tarball
          TARBALL="$(ls packages/gazetta/gazetta-*.tgz | head -1)"
          GAZETTA_TARBALL="$(pwd)/$TARBALL" npm run smoke
