name: Deploy gazetta.studio

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'sites/gazetta.studio/**'
      - 'packages/gazetta/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - run: npm run build

      - name: Publish site to R2
        run: npx tsx packages/gazetta/src/cli/index.ts publish sites/gazetta.studio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy worker
        run: cd sites/gazetta.studio/worker && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
