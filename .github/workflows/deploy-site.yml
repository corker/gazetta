name: Deploy gazetta.studio

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'sites/gazetta.studio/**'
      - 'packages/gazetta/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - run: npm ci

      - run: npm run build -w packages/gazetta

      - name: Publish site to R2
        run: npx tsx packages/gazetta/src/cli/index.ts publish production sites/gazetta.studio
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy worker
        run: cd sites/gazetta.studio/worker && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
