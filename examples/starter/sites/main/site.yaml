name: "Gazetta Starter"
version: "1.0.0"
systemPages:
  - "404"
targets:
  staging:
    storage:
      type: filesystem
      path: ./dist/staging
  esi-test:
    storage:
      type: filesystem
      path: ./dist/esi-test
    publishMode: esi
  production:
    storage:
      type: azure-blob
      connectionString: "UseDevelopmentStorage=true"
      container: "gazetta-production"
